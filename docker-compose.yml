version: '3.8'

services:
  # Backend Service (Spring Boot)
  backend:
    build:
      context: ./accreditation
      dockerfile: Dockerfile
    container_name: medek-backend
    ports:
      - "8080:8080"
    environment:
      # host.docker.internal kullanıyoruz ki Docker içindeki backend, 
      # senin bilgisayarında zaten halihazırda çalışan eski veritabanına bağlanabilsin.
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:postgresql://host.docker.internal:5432/postgres}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  # Frontend Service (Next.js)
  frontend:
    build:
      context: ./accreditation-frontend
      dockerfile: Dockerfile
    container_name: medek-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - backend
    restart: unless-stopped
